---
cluster: "cirrus"

form:
  - cpu
  - memory
  - wall_time

attributes:
  cpu:
    widget: number_field
    label: "CPUs"
    min: 1
    max: 8
    value: 1
    step: 1
    required: true
  memory:
    widget: number_field
    label: "Memory (GB)"
    min: 1
    max: 32
    value: 4
    step: 1
    required: true
  wall_time:
    widget: number_field
    label: "Wall time (hours)"
    min: 1
    max: 24
    value: 1
    step: 1
    required: true
